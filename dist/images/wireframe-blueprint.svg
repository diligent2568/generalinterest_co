<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1200" fill="none" stroke-linecap="round" stroke-linejoin="round">

  <!-- ========== GROUND PLANE / PERSPECTIVE GRID ========== -->
  <g stroke="rgba(255,255,255,0.025)" stroke-width="0.4">
    <!-- Horizon -->
    <line x1="0" y1="780" x2="1600" y2="780"/>
    <!-- Converging perspective lines to vanishing point at 800,380 -->
    <line x1="800" y1="380" x2="0" y2="780"/>
    <line x1="800" y1="380" x2="200" y2="780"/>
    <line x1="800" y1="380" x2="400" y2="780"/>
    <line x1="800" y1="380" x2="600" y2="780"/>
    <line x1="800" y1="380" x2="1000" y2="780"/>
    <line x1="800" y1="380" x2="1200" y2="780"/>
    <line x1="800" y1="380" x2="1400" y2="780"/>
    <line x1="800" y1="380" x2="1600" y2="780"/>
    <!-- Ground grid cross-lines -->
    <line x1="160" y1="680" x2="1440" y2="680"/>
    <line x1="280" y1="620" x2="1320" y2="620"/>
    <line x1="380" y1="560" x2="1220" y2="560"/>
    <line x1="460" y1="500" x2="1140" y2="500"/>
    <line x1="100" y1="780" x2="1500" y2="780"/>
    <!-- Extended ground beyond horizon -->
    <line x1="800" y1="380" x2="0" y2="1100"/>
    <line x1="800" y1="380" x2="1600" y2="1100"/>
    <line x1="0" y1="900" x2="1600" y2="900"/>
    <line x1="0" y1="1020" x2="1600" y2="1020"/>
  </g>

  <!-- ========== BUILDING A — Left complex (L-shaped) ========== -->
  <g stroke="rgba(255,255,255,0.06)" stroke-width="0.5">
    <!-- Front face -->
    <polygon points="60,770 290,770 290,240 60,240"/>
    <!-- Right face (perspective) -->
    <polygon points="290,770 420,730 420,210 290,240"/>
    <!-- Top face -->
    <polygon points="60,240 290,240 420,210 190,210"/>
    <!-- Wing extension (L-shape rear) -->
    <polygon points="290,770 290,480 420,450 420,730"/>
    <polygon points="290,480 190,480 190,210 290,240"/>
    <!-- Internal column grid -->
    <line x1="120" y1="240" x2="120" y2="770"/>
    <line x1="180" y1="240" x2="180" y2="770"/>
    <line x1="240" y1="240" x2="240" y2="770"/>
    <line x1="340" y1="210" x2="340" y2="730"/>
    <line x1="380" y1="210" x2="380" y2="730"/>
    <!-- Floor slabs -->
    <line x1="60" y1="310" x2="290" y2="310"/><line x1="290" y1="310" x2="420" y2="282"/>
    <line x1="60" y1="380" x2="290" y2="380"/><line x1="290" y1="380" x2="420" y2="352"/>
    <line x1="60" y1="450" x2="290" y2="450"/><line x1="290" y1="450" x2="420" y2="422"/>
    <line x1="60" y1="520" x2="290" y2="520"/><line x1="290" y1="520" x2="420" y2="492"/>
    <line x1="60" y1="590" x2="290" y2="590"/><line x1="290" y1="590" x2="420" y2="562"/>
    <line x1="60" y1="660" x2="290" y2="660"/><line x1="290" y1="660" x2="420" y2="632"/>
    <line x1="60" y1="730" x2="290" y2="730"/><line x1="290" y1="730" x2="420" y2="700"/>
    <!-- Window mullions (front face vertical subdivisions) -->
    <line x1="95" y1="310" x2="95" y2="380"/>
    <line x1="145" y1="310" x2="145" y2="380"/>
    <line x1="210" y1="310" x2="210" y2="380"/>
    <line x1="265" y1="310" x2="265" y2="380"/>
    <line x1="95" y1="450" x2="95" y2="520"/>
    <line x1="145" y1="450" x2="145" y2="520"/>
    <line x1="210" y1="450" x2="210" y2="520"/>
    <line x1="265" y1="450" x2="265" y2="520"/>
    <line x1="95" y1="590" x2="95" y2="660"/>
    <line x1="145" y1="590" x2="145" y2="660"/>
    <line x1="210" y1="590" x2="210" y2="660"/>
    <line x1="265" y1="590" x2="265" y2="660"/>
    <!-- Roof mechanical penthouse -->
    <rect x="120" y="215" width="80" height="25" stroke="rgba(255,255,255,0.04)"/>
    <line x1="120" y1="215" x2="150" y2="200"/>
    <line x1="200" y1="215" x2="230" y2="200"/>
    <line x1="150" y1="200" x2="230" y2="200"/>
    <line x1="120" y1="240" x2="150" y2="225"/>
    <line x1="200" y1="240" x2="230" y2="225"/>
  </g>

  <!-- Structural diagonal bracing (Building A) -->
  <g stroke="rgba(255,255,255,0.035)" stroke-width="0.4">
    <line x1="60" y1="310" x2="290" y2="380"/>
    <line x1="290" y1="310" x2="60" y2="380"/>
    <line x1="60" y1="590" x2="290" y2="660"/>
    <line x1="290" y1="590" x2="60" y2="660"/>
  </g>

  <!-- ========== BUILDING B — Central tower (tallest) ========== -->
  <g stroke="rgba(255,255,255,0.07)" stroke-width="0.5">
    <!-- Front face -->
    <polygon points="520,770 740,770 740,120 520,120"/>
    <!-- Right face -->
    <polygon points="740,770 870,735 870,95 740,120"/>
    <!-- Top face -->
    <polygon points="520,120 740,120 870,95 650,95"/>
    <!-- Structural core (visible through facade) -->
    <rect x="590" y="120" width="60" height="650" stroke="rgba(255,255,255,0.03)" stroke-width="0.3"/>
    <!-- Column grid -->
    <line x1="560" y1="120" x2="560" y2="770"/>
    <line x1="600" y1="120" x2="600" y2="770"/>
    <line x1="650" y1="120" x2="650" y2="770"/>
    <line x1="700" y1="120" x2="700" y2="770"/>
    <line x1="790" y1="95" x2="790" y2="735"/>
    <line x1="830" y1="95" x2="830" y2="735"/>
    <!-- Floor slabs (every ~60px) -->
    <line x1="520" y1="185" x2="740" y2="185"/><line x1="740" y1="185" x2="870" y2="162"/>
    <line x1="520" y1="250" x2="740" y2="250"/><line x1="740" y1="250" x2="870" y2="227"/>
    <line x1="520" y1="315" x2="740" y2="315"/><line x1="740" y1="315" x2="870" y2="292"/>
    <line x1="520" y1="380" x2="740" y2="380"/><line x1="740" y1="380" x2="870" y2="357"/>
    <line x1="520" y1="445" x2="740" y2="445"/><line x1="740" y1="445" x2="870" y2="422"/>
    <line x1="520" y1="510" x2="740" y2="510"/><line x1="740" y1="510" x2="870" y2="487"/>
    <line x1="520" y1="575" x2="740" y2="575"/><line x1="740" y1="575" x2="870" y2="552"/>
    <line x1="520" y1="640" x2="740" y2="640"/><line x1="740" y1="640" x2="870" y2="617"/>
    <line x1="520" y1="705" x2="740" y2="705"/><line x1="740" y1="705" x2="870" y2="682"/>
    <!-- Curtain wall horizontal spandrels (side face) -->
    <line x1="740" y1="185" x2="870" y2="162"/>
    <line x1="740" y1="250" x2="870" y2="227"/>
    <!-- Window bays (front face detail) -->
    <line x1="540" y1="185" x2="540" y2="250"/>
    <line x1="575" y1="185" x2="575" y2="250"/>
    <line x1="620" y1="185" x2="620" y2="250"/>
    <line x1="670" y1="185" x2="670" y2="250"/>
    <line x1="720" y1="185" x2="720" y2="250"/>
    <line x1="540" y1="315" x2="540" y2="380"/>
    <line x1="575" y1="315" x2="575" y2="380"/>
    <line x1="620" y1="315" x2="620" y2="380"/>
    <line x1="670" y1="315" x2="670" y2="380"/>
    <line x1="720" y1="315" x2="720" y2="380"/>
    <line x1="540" y1="445" x2="540" y2="510"/>
    <line x1="575" y1="445" x2="575" y2="510"/>
    <line x1="620" y1="445" x2="620" y2="510"/>
    <line x1="670" y1="445" x2="670" y2="510"/>
    <line x1="720" y1="445" x2="720" y2="510"/>
    <line x1="540" y1="575" x2="540" y2="640"/>
    <line x1="575" y1="575" x2="575" y2="640"/>
    <line x1="620" y1="575" x2="620" y2="640"/>
    <line x1="670" y1="575" x2="670" y2="640"/>
    <line x1="720" y1="575" x2="720" y2="640"/>
    <!-- Roof antenna/spire -->
    <line x1="630" y1="120" x2="630" y2="60"/>
    <line x1="625" y1="80" x2="635" y2="80"/>
    <line x1="620" y1="95" x2="640" y2="95"/>
  </g>

  <!-- Structural X-bracing (Building B core) -->
  <g stroke="rgba(255,255,255,0.03)" stroke-width="0.35">
    <line x1="590" y1="185" x2="650" y2="250"/>
    <line x1="650" y1="185" x2="590" y2="250"/>
    <line x1="590" y1="315" x2="650" y2="380"/>
    <line x1="650" y1="315" x2="590" y2="380"/>
    <line x1="590" y1="445" x2="650" y2="510"/>
    <line x1="650" y1="445" x2="590" y2="510"/>
    <line x1="590" y1="575" x2="650" y2="640"/>
    <line x1="650" y1="575" x2="590" y2="640"/>
  </g>

  <!-- ========== BUILDING C — Right mid-rise with setback ========== -->
  <g stroke="rgba(255,255,255,0.055)" stroke-width="0.5">
    <!-- Lower mass -->
    <polygon points="950,770 1200,770 1200,400 950,400"/>
    <polygon points="1200,770 1330,735 1330,375 1200,400"/>
    <polygon points="950,400 1200,400 1330,375 1080,375"/>
    <!-- Upper setback -->
    <polygon points="990,400 1150,400 1150,220 990,220"/>
    <polygon points="1150,400 1250,375 1250,200 1150,220"/>
    <polygon points="990,220 1150,220 1250,200 1090,200"/>
    <!-- Columns -->
    <line x1="1000" y1="220" x2="1000" y2="770"/>
    <line x1="1050" y1="220" x2="1050" y2="770"/>
    <line x1="1100" y1="220" x2="1100" y2="770"/>
    <line x1="1150" y1="220" x2="1150" y2="770"/>
    <line x1="1250" y1="375" x2="1250" y2="735"/>
    <line x1="1290" y1="375" x2="1290" y2="735"/>
    <!-- Floors lower -->
    <line x1="950" y1="470" x2="1200" y2="470"/><line x1="1200" y1="470" x2="1330" y2="447"/>
    <line x1="950" y1="540" x2="1200" y2="540"/><line x1="1200" y1="540" x2="1330" y2="517"/>
    <line x1="950" y1="610" x2="1200" y2="610"/><line x1="1200" y1="610" x2="1330" y2="587"/>
    <line x1="950" y1="680" x2="1200" y2="680"/><line x1="1200" y1="680" x2="1330" y2="657"/>
    <!-- Floors upper setback -->
    <line x1="990" y1="280" x2="1150" y2="280"/><line x1="1150" y1="280" x2="1250" y2="262"/>
    <line x1="990" y1="340" x2="1150" y2="340"/><line x1="1150" y1="340" x2="1250" y2="322"/>
    <!-- Terrace railing on setback -->
    <line x1="950" y1="390" x2="990" y2="390"/>
    <line x1="1150" y1="390" x2="1200" y2="390"/>
    <!-- Window detail upper -->
    <line x1="1020" y1="280" x2="1020" y2="340"/>
    <line x1="1060" y1="280" x2="1060" y2="340"/>
    <line x1="1110" y1="280" x2="1110" y2="340"/>
    <!-- Roof detail -->
    <rect x="1040" y="205" width="50" height="15" stroke="rgba(255,255,255,0.03)"/>
  </g>

  <!-- ========== SKYBRIDGE between B and C ========== -->
  <g stroke="rgba(255,255,255,0.04)" stroke-width="0.4">
    <polygon points="870,445 950,445 950,510 870,510"/>
    <polygon points="870,487" />
    <line x1="870" y1="445" x2="950" y2="445"/>
    <line x1="870" y1="478" x2="950" y2="478"/>
    <line x1="870" y1="510" x2="950" y2="510"/>
    <line x1="890" y1="445" x2="890" y2="510"/>
    <line x1="910" y1="445" x2="910" y2="510"/>
    <line x1="930" y1="445" x2="930" y2="510"/>
    <!-- Truss diagonals -->
    <line x1="870" y1="445" x2="890" y2="510"/>
    <line x1="890" y1="445" x2="910" y2="510"/>
    <line x1="910" y1="445" x2="930" y2="510"/>
    <line x1="930" y1="445" x2="950" y2="510"/>
  </g>

  <!-- ========== SMALL STRUCTURE D — Far right pavilion ========== -->
  <g stroke="rgba(255,255,255,0.04)" stroke-width="0.4">
    <polygon points="1400,770 1540,770 1540,550 1400,550"/>
    <polygon points="1540,770 1600,750 1600,535 1540,550"/>
    <polygon points="1400,550 1540,550 1600,535 1460,535"/>
    <!-- Exposed frame -->
    <line x1="1430" y1="550" x2="1430" y2="770"/>
    <line x1="1470" y1="550" x2="1470" y2="770"/>
    <line x1="1510" y1="550" x2="1510" y2="770"/>
    <line x1="1570" y1="535" x2="1570" y2="750"/>
    <line x1="1400" y1="620" x2="1540" y2="620"/><line x1="1540" y1="620" x2="1600" y2="607"/>
    <line x1="1400" y1="695" x2="1540" y2="695"/><line x1="1540" y1="695" x2="1600" y2="680"/>
    <!-- X-bracing -->
    <line x1="1400" y1="550" x2="1540" y2="620"/>
    <line x1="1540" y1="550" x2="1400" y2="620"/>
    <line x1="1400" y1="620" x2="1540" y2="695"/>
    <line x1="1540" y1="620" x2="1400" y2="695"/>
  </g>

  <!-- ========== TOWER CRANE ========== -->
  <g stroke="rgba(255,255,255,0.04)" stroke-width="0.4">
    <!-- Mast -->
    <line x1="460" y1="770" x2="460" y2="50"/>
    <line x1="475" y1="770" x2="475" y2="50"/>
    <!-- Mast lattice -->
    <line x1="460" y1="100" x2="475" y2="150"/>
    <line x1="475" y1="100" x2="460" y2="150"/>
    <line x1="460" y1="200" x2="475" y2="250"/>
    <line x1="475" y1="200" x2="460" y2="250"/>
    <line x1="460" y1="300" x2="475" y2="350"/>
    <line x1="475" y1="300" x2="460" y2="350"/>
    <line x1="460" y1="400" x2="475" y2="450"/>
    <line x1="475" y1="400" x2="460" y2="450"/>
    <line x1="460" y1="500" x2="475" y2="550"/>
    <line x1="475" y1="500" x2="460" y2="550"/>
    <line x1="460" y1="600" x2="475" y2="650"/>
    <line x1="475" y1="600" x2="460" y2="650"/>
    <!-- Jib (boom arm) -->
    <line x1="475" y1="55" x2="700" y2="50"/>
    <line x1="475" y1="65" x2="700" y2="60"/>
    <!-- Jib lattice -->
    <line x1="510" y1="55" x2="530" y2="65"/>
    <line x1="550" y1="55" x2="570" y2="65"/>
    <line x1="590" y1="55" x2="610" y2="65"/>
    <line x1="630" y1="55" x2="650" y2="65"/>
    <line x1="670" y1="50" x2="690" y2="60"/>
    <!-- Counter-jib -->
    <line x1="460" y1="55" x2="380" y2="50"/>
    <line x1="460" y1="65" x2="380" y2="60"/>
    <!-- Pendants (tie cables) -->
    <line x1="467" y1="30" x2="700" y2="50" stroke-dasharray="3,4"/>
    <line x1="467" y1="30" x2="380" y2="50" stroke-dasharray="3,4"/>
    <!-- Cat head -->
    <line x1="460" y1="30" x2="475" y2="30"/>
    <line x1="460" y1="50" x2="460" y2="30"/>
    <line x1="475" y1="50" x2="475" y2="30"/>
    <!-- Hook cable -->
    <line x1="620" y1="55" x2="620" y2="180" stroke-dasharray="2,3"/>
    <line x1="612" y1="180" x2="628" y2="180"/>
    <line x1="615" y1="180" x2="620" y2="195"/>
    <line x1="625" y1="180" x2="620" y2="195"/>
  </g>

  <!-- ========== DIMENSION / ANNOTATION LINES ========== -->
  <g stroke="rgba(255,255,255,0.03)" stroke-width="0.3" stroke-dasharray="5,8">
    <!-- Horizontal dims -->
    <line x1="60" y1="795" x2="420" y2="795"/>
    <line x1="520" y1="795" x2="870" y2="795"/>
    <line x1="950" y1="795" x2="1330" y2="795"/>
    <!-- Dim ticks -->
    <line x1="60" y1="790" x2="60" y2="800" stroke-dasharray="none"/>
    <line x1="420" y1="790" x2="420" y2="800" stroke-dasharray="none"/>
    <line x1="520" y1="790" x2="520" y2="800" stroke-dasharray="none"/>
    <line x1="870" y1="790" x2="870" y2="800" stroke-dasharray="none"/>
    <line x1="950" y1="790" x2="950" y2="800" stroke-dasharray="none"/>
    <line x1="1330" y1="790" x2="1330" y2="800" stroke-dasharray="none"/>
    <!-- Vertical dims -->
    <line x1="40" y1="240" x2="40" y2="770"/>
    <line x1="35" y1="240" x2="45" y2="240" stroke-dasharray="none"/>
    <line x1="35" y1="770" x2="45" y2="770" stroke-dasharray="none"/>
    <line x1="500" y1="60" x2="500" y2="770"/>
    <line x1="495" y1="60" x2="505" y2="60" stroke-dasharray="none"/>
    <line x1="495" y1="770" x2="505" y2="770" stroke-dasharray="none"/>
  </g>

  <!-- ========== SECTION CUT MARKERS ========== -->
  <g stroke="rgba(255,255,255,0.025)" stroke-width="0.5" stroke-dasharray="12,4,2,4">
    <line x1="0" y1="450" x2="1600" y2="450"/>
  </g>
  <!-- Section arrows -->
  <g fill="rgba(255,255,255,0.025)" stroke="none">
    <polygon points="15,445 15,455 5,450"/>
    <polygon points="1585,445 1585,455 1595,450"/>
  </g>

  <!-- ========== FOUNDATION / BELOW GRADE ========== -->
  <g stroke="rgba(255,255,255,0.02)" stroke-width="0.4">
    <!-- Pile caps under Building A -->
    <rect x="80" y="770" width="40" height="30"/>
    <rect x="180" y="770" width="40" height="30"/>
    <rect x="260" y="770" width="40" height="30"/>
    <line x1="100" y1="800" x2="100" y2="850"/>
    <line x1="200" y1="800" x2="200" y2="850"/>
    <line x1="280" y1="800" x2="280" y2="850"/>
    <!-- Pile caps under Building B -->
    <rect x="560" y="770" width="40" height="30"/>
    <rect x="660" y="770" width="40" height="30"/>
    <line x1="580" y1="800" x2="580" y2="870"/>
    <line x1="680" y1="800" x2="680" y2="870"/>
    <!-- Grade line hatching -->
    <line x1="0" y1="770" x2="20" y2="790"/>
    <line x1="30" y1="770" x2="50" y2="790"/>
    <line x1="60" y1="770" x2="80" y2="790"/>
    <line x1="420" y1="770" x2="440" y2="790"/>
    <line x1="450" y1="770" x2="470" y2="790"/>
    <line x1="870" y1="770" x2="890" y2="790"/>
    <line x1="900" y1="770" x2="920" y2="790"/>
    <line x1="1330" y1="770" x2="1350" y2="790"/>
    <line x1="1360" y1="770" x2="1380" y2="790"/>
  </g>

  <!-- ========== COMPASS ROSE (top-right) ========== -->
  <g stroke="rgba(255,255,255,0.035)" stroke-width="0.5" transform="translate(1480,100)">
    <circle cx="0" cy="0" r="30" fill="none"/>
    <line x1="0" y1="-35" x2="0" y2="35"/>
    <line x1="-35" y1="0" x2="35" y2="0"/>
    <line x1="-5" y1="-30" x2="0" y2="-40"/>
    <line x1="5" y1="-30" x2="0" y2="-40"/>
    <!-- Diagonal ticks -->
    <line x1="21" y1="-21" x2="25" y2="-25"/>
    <line x1="-21" y1="-21" x2="-25" y2="-25"/>
    <line x1="21" y1="21" x2="25" y2="25"/>
    <line x1="-21" y1="21" x2="-25" y2="25"/>
  </g>

  <!-- ========== SCALE BAR (bottom-right) ========== -->
  <g stroke="rgba(255,255,255,0.03)" stroke-width="0.4" transform="translate(1300,830)">
    <line x1="0" y1="0" x2="200" y2="0"/>
    <line x1="0" y1="-5" x2="0" y2="5"/>
    <line x1="50" y1="-3" x2="50" y2="3"/>
    <line x1="100" y1="-5" x2="100" y2="5"/>
    <line x1="150" y1="-3" x2="150" y2="3"/>
    <line x1="200" y1="-5" x2="200" y2="5"/>
  </g>

  <!-- ========== DETAIL CALLOUT CIRCLES ========== -->
  <g stroke="rgba(255,255,255,0.025)" stroke-width="0.4" fill="none">
    <circle cx="350" cy="350" r="45"/>
    <line x1="395" y1="350" x2="450" y2="320" stroke-dasharray="3,4"/>
    <circle cx="1150" cy="300" r="40"/>
    <line x1="1190" y1="300" x2="1240" y2="280" stroke-dasharray="3,4"/>
